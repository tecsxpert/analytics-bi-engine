server:
  port: 8080

spring:
  application:
    name: analytics-bi-engine

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""

  security:   # 👈 ADD THIS BLOCK
    user:
      name: admin
      password: admin123

jwt:
  secret: test-secret-key
  expiration-ms: 86400000